name: 🌐 全球金融情报推送

on:
  schedule:
    # 每小时整点触发（UTC时间，北京时间 = UTC+8）
    # 例：UTC 01:00 = 北京 09:00
    - cron: '0 * * * *'
  
  # 允许手动触发（方便测试）
  workflow_dispatch:

jobs:
  push-finance-intel:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # 1. 拉取代码
      - name: 📥 Checkout 代码
        uses: actions/checkout@v4

      # 2. 配置 Python 环境
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. 安装依赖
      - name: 📦 安装依赖
        run: |
          pip install --upgrade pip
          pip install requests feedparser

      # 4. 运行推送脚本
      - name: 🚀 推送全球金融情报到飞书
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          FEISHU_SECRET: ${{ secrets.FEISHU_SECRET }}
        run: |
          python feishu_finance.py

      # 5. 记录运行状态
      - name: 📝 记录运行时间
        if: always()
        run: |
          echo "运行完成于: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S') 北京时间"
